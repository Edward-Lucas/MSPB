<!doctype html>
<html lang="ko" class="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>MSPB Dashboard</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwindcss.config = {
                darkMode: "class",
                theme: {
                    extend: {
                        colors: {
                            primary: { DEFAULT: "hsl(210, 80%, 55%)" },
                            secondary: { DEFAULT: "hsl(190, 70%, 50%)" },
                            background: { DEFAULT: "hsl(220, 20%, 8%)" },
                            foreground: { DEFAULT: "hsl(210, 10%, 90%)" },
                            card: { DEFAULT: "hsl(220, 15%, 12%)" },
                            muted: { DEFAULT: "hsl(220, 10%, 18%)" },
                            "muted-foreground": {
                                DEFAULT: "hsl(210, 5%, 55%)",
                            },
                            border: { DEFAULT: "hsl(220, 10%, 20%)" },
                            destructive: { DEFAULT: "hsl(0, 62%, 50%)" },
                        },
                    },
                },
            };
        </script>
        <style>
            :root {
                --gradient-primary: linear-gradient(
                    135deg,
                    hsl(210, 80%, 55%),
                    hsl(190, 70%, 50%)
                );
                --glass-bg: hsla(220, 20%, 10%, 0.6);
                --glass-border: hsla(220, 10%, 22%, 0.5);
                --shadow-glass: 0 8px 32px 0 hsla(220, 30%, 0%, 0.4);
                --shadow-glow: 0 0 40px hsla(210, 80%, 55%, 0.2);
                --blur-amount: 12px;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    "Helvetica Neue", Arial, sans-serif;
                background: hsl(220, 20%, 8%);
                color: hsl(210, 10%, 90%);
                line-height: 1.6;
                -webkit-font-smoothing: antialiased;
            }

            .glass-card {
                border-radius: 1rem;
                border: 1px solid var(--glass-border);
                background: var(--glass-bg);
                backdrop-filter: blur(var(--blur-amount));
                box-shadow: var(--shadow-glass);
            }

            .gradient-text {
                background: var(--gradient-primary);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .gradient-btn {
                background: var(--gradient-primary);
                color: #fff;
                border: none;
                border-radius: 0.5rem;
                padding: 0.5rem 1.25rem;
                font-size: 0.875rem;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.2s ease;
                text-decoration: none;
                display: inline-flex;
                align-items: center;
                gap: 0.375rem;
            }
            .gradient-btn:hover {
                transform: translateY(-1px);
                box-shadow: 0 4px 16px hsla(210, 80%, 55%, 0.3);
            }

            .btn-danger {
                background: hsl(0, 62%, 50%);
                color: #fff;
                border: none;
                border-radius: 0.5rem;
                padding: 0.375rem 0.875rem;
                font-size: 0.75rem;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.2s ease;
            }
            .btn-danger:hover {
                background: hsl(0, 62%, 45%);
            }

            .btn-refresh {
                background: hsl(220, 15%, 18%);
                color: hsl(210, 10%, 80%);
                border: 1px solid hsl(220, 10%, 22%);
                border-radius: 0.5rem;
                padding: 0.5rem 1rem;
                font-size: 0.875rem;
                font-weight: 500;
                cursor: pointer;
                transition: all 0.2s ease;
            }
            .btn-refresh:hover {
                background: hsl(220, 15%, 22%);
            }

            /* Status dot */
            .status-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                display: inline-block;
            }
            .status-dot.online {
                background: hsl(142, 71%, 45%);
            }
            .status-dot.offline {
                background: hsl(0, 62%, 50%);
            }

            /* Table */
            .data-table {
                width: 100%;
                border-collapse: collapse;
            }
            .data-table th {
                text-align: left;
                padding: 0.75rem 1rem;
                font-size: 0.75rem;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                color: hsl(210, 5%, 50%);
                border-bottom: 1px solid hsl(220, 10%, 20%);
            }
            .data-table td {
                padding: 0.75rem 1rem;
                font-size: 0.875rem;
                border-bottom: 1px solid hsl(220, 10%, 15%);
            }
            .data-table tr:hover td {
                background: hsla(220, 15%, 12%, 0.5);
            }

            /* Fade in */
            .fade-in {
                animation: fadeIn 0.3s ease-out;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            /* Scrollbar */
            ::-webkit-scrollbar {
                width: 6px;
            }
            ::-webkit-scrollbar-track {
                background: hsl(220, 20%, 8%);
            }
            ::-webkit-scrollbar-thumb {
                background: hsl(220, 10%, 25%);
                border-radius: 3px;
            }

            /* Toast */
            .toast {
                position: fixed;
                bottom: 2rem;
                right: 2rem;
                padding: 0.75rem 1.25rem;
                border-radius: 0.75rem;
                font-size: 0.875rem;
                font-weight: 500;
                z-index: 1000;
                animation: slideUp 0.3s ease-out;
            }
            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .toast.success {
                background: hsl(142, 71%, 35%);
                color: #fff;
            }
            .toast.error {
                background: hsl(0, 62%, 45%);
                color: #fff;
            }

            /* Modal overlay */
            .modal-overlay {
                position: fixed;
                inset: 0;
                background: hsla(220, 20%, 5%, 0.8);
                backdrop-filter: blur(4px);
                z-index: 100;
                display: flex;
                align-items: center;
                justify-content: center;
                animation: fadeIn 0.2s ease-out;
            }
            .modal-content {
                background: hsl(220, 15%, 12%);
                border: 1px solid hsl(220, 10%, 22%);
                border-radius: 1rem;
                padding: 2rem;
                max-width: 640px;
                width: 90%;
                max-height: 80vh;
                overflow-y: auto;
                box-shadow: 0 16px 64px hsla(0, 0%, 0%, 0.5);
            }
            .modal-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 1.5rem;
                padding-bottom: 1rem;
                border-bottom: 1px solid hsl(220, 10%, 20%);
            }
            .modal-close {
                background: none;
                border: none;
                color: hsl(210, 5%, 50%);
                cursor: pointer;
                font-size: 1.5rem;
                line-height: 1;
                padding: 0.25rem;
            }
            .modal-close:hover {
                color: hsl(210, 10%, 90%);
            }

            /* Traffic bar */
            .traffic-bar {
                height: 6px;
                border-radius: 3px;
                background: hsl(220, 10%, 18%);
                overflow: hidden;
                margin-top: 0.25rem;
            }
            .traffic-bar-in {
                height: 100%;
                background: hsl(210, 80%, 55%);
                border-radius: 3px;
                transition: width 0.3s ease;
            }
            .traffic-bar-out {
                height: 100%;
                background: hsl(190, 70%, 50%);
                border-radius: 3px;
                transition: width 0.3s ease;
            }

            /* Clickable cell */
            .clickable {
                cursor: pointer;
                transition:
                    background 0.15s ease,
                    box-shadow 0.15s ease;
                border-radius: 0.375rem;
            }
            .clickable:hover {
                background: hsla(210, 80%, 55%, 0.08);
                box-shadow: inset 0 0 0 1px hsla(210, 80%, 55%, 0.15);
            }

            /* Unlimited toggle buttons */
            .btn-unlimited-off {
                background: hsl(220, 15%, 18%);
                color: hsl(210, 5%, 55%);
                border: 1px solid hsl(220, 10%, 25%);
                cursor: pointer;
                transition: all 0.15s ease;
            }
            .btn-unlimited-off:hover {
                background: hsl(210, 80%, 55%, 0.15);
                border-color: hsl(210, 80%, 55%, 0.4);
                color: hsl(210, 80%, 70%);
            }
            .btn-unlimited-on {
                background: hsla(142, 70%, 45%, 0.15);
                color: hsl(142, 70%, 60%);
                border: 1px solid hsla(142, 70%, 45%, 0.3);
                cursor: pointer;
                transition: all 0.15s ease;
            }
            .btn-unlimited-on:hover {
                background: hsla(142, 70%, 45%, 0.25);
                border-color: hsla(142, 70%, 45%, 0.5);
            }
        </style>
    </head>

        <script>
            const API_BASE = window.location.origin;
            let refreshInterval = null;

            // Global rate tracking for stats card
            let lastTotalBytesIn = 0;
            let lastTotalBytesOut = 0;

            // Traffic history per port (for usage graphs)
            const trafficHistory = {}; // port -> { in: [{t, v}], out: [{t, v}] }
            const HISTORY_MAX = 60; // 60 data points = 1 minute at 1s interval

            const intervalHistory = {}; // port -> { in: [{t, v}], out: [{t, v}] }

            function recordTraffic(
                port,
                bytesIn,
                bytesOut,
                intervalIn,
                intervalOut,
            ) {
                if (!trafficHistory[port]) {
                    trafficHistory[port] = { in: [], out: [] };
                }
                const h = trafficHistory[port];
                const now = Date.now();
                h.in.push({ t: now, v: bytesIn });
                h.out.push({ t: now, v: bytesOut });
                if (h.in.length > HISTORY_MAX) h.in.shift();
                if (h.out.length > HISTORY_MAX) h.out.shift();

                if (!intervalHistory[port]) {
                    intervalHistory[port] = { in: [], out: [] };
                }
                const ih = intervalHistory[port];
                ih.in.push({ t: now, v: intervalIn });
                ih.out.push({ t: now, v: intervalOut });
                if (ih.in.length > HISTORY_MAX) ih.in.shift();
                if (ih.out.length > HISTORY_MAX) ih.out.shift();
            }

            // ── 유틸리티 ──

            function formatUptime(seconds) {
                if (seconds < 60) return `${seconds}초`;
                if (seconds < 3600) return `${Math.floor(seconds / 60)}분`;
                if (seconds < 86400) {
                    const h = Math.floor(seconds / 3600);
                    const m = Math.floor((seconds % 3600) / 60);
                    return `${h}시간 ${m}분`;
                }
                const d = Math.floor(seconds / 86400);
                const h = Math.floor((seconds % 86400) / 3600);
                return `${d}일 ${h}시간`;
            }

            function formatTime(iso) {
                if (!iso) return "-";
                const d = new Date(iso);
                const now = new Date();
                const diff = Math.floor((now - d) / 1000);
                if (diff < 10) return "방금 전";
                if (diff < 60) return `${diff}초 전`;
                if (diff < 3600) return `${Math.floor(diff / 60)}분 전`;
                return d.toLocaleTimeString("ko-KR", {
                    hour: "2-digit",
                    minute: "2-digit",
                });
            }

            function formatBytes(bytes) {
                if (bytes === 0) return "0 B";
                const k = 1024;
                const sizes = ["B", "KB", "MB", "GB"];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return (
                    parseFloat((bytes / Math.pow(k, i)).toFixed(1)) +
                    " " +
                    sizes[i]
                );
            }

            // Fixed-width bytes format (always 10 chars: " 1234.5 KB")
            function formatBytesFixed(bytes) {
                if (bytes === 0) return "    0.0 B ";
                const k = 1024;
                const sizes = ["B ", "KB", "MB", "GB"];
                const i = Math.min(
                    Math.floor(Math.log(bytes) / Math.log(k)),
                    sizes.length - 1,
                );
                const val = (bytes / Math.pow(k, i)).toFixed(1);
                return val.padStart(7) + " " + sizes[i];
            }

            // Heartbeat countdown (15s interval)
            const HEARTBEAT_INTERVAL = 15;
            function formatHeartbeatCountdown(iso) {
                if (!iso) return "-";
                const lastBeat = new Date(iso).getTime();
                const elapsed = Math.floor((Date.now() - lastBeat) / 1000);
                const remaining =
                    HEARTBEAT_INTERVAL - (elapsed % HEARTBEAT_INTERVAL) - 1;
                if (remaining <= 0) return "now";
                return remaining + "s";
            }

            function showToast(message, type = "success") {
                const existing = document.querySelector(".toast");
                if (existing) existing.remove();

                const toast = document.createElement("div");
                toast.className = `toast ${type}`;
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }

            // ── API 호출 ──

            async function fetchStats() {
                try {
                    const res = await fetch(`${API_BASE}/api/stats`);
                    if (!res.ok) throw new Error(res.statusText);
                    const data = await res.json();

                    document.getElementById("stat-sessions").textContent =
                        data.active_sessions;
                    document.getElementById("stat-players").textContent =
                        data.total_players;
                    document.getElementById("stat-ports").textContent =
                        `${data.port_range_start}-${data.port_range_end}`;
                    document.getElementById("stat-uptime").textContent =
                        formatUptime(data.uptime_seconds);
                    document.getElementById("stat-total-traffic").textContent =
                        formatBytes(data.total_bytes_transferred);

                    // Compute real-time rate from cumulative totals
                    const rateIn = data.total_bytes_in - lastTotalBytesIn;
                    const rateOut = data.total_bytes_out - lastTotalBytesOut;
                    lastTotalBytesIn = data.total_bytes_in;
                    lastTotalBytesOut = data.total_bytes_out;
                    document.getElementById("stat-rate").textContent =
                        formatBytes(rateIn + rateOut) + "/s";

                    setStatus(true);
                } catch (e) {
                    setStatus(false);
                    console.error("Stats fetch error:", e);
                }
            }

            async function fetchSessions() {
                try {
                    const res = await fetch(`${API_BASE}/api/sessions`);
                    if (!res.ok) throw new Error(res.statusText);
                    const sessions = await res.json();

                    document.getElementById("session-count").textContent =
                        `${sessions.length}개`;

                    const tbody = document.getElementById("sessions-body");
                    if (sessions.length === 0) {
                        tbody.innerHTML = `
            <tr>
              <td colspan="9" class="text-center py-8 text-[hsl(210,5%,50%)]">
                활성 세션이 없습니다
              </td>
            </tr>`;
                        return;
                    }

                    // Remove placeholder/loading rows
                    tbody
                        .querySelectorAll("tr:not([data-port])")
                        .forEach((r) => r.remove());

                    const existingRows =
                        tbody.querySelectorAll("tr[data-port]");
                    const existingMap = {};
                    existingRows.forEach((row) => {
                        existingMap[row.dataset.port] = row;
                    });

                    const seenPorts = new Set();

                    // Update or create rows
                    sessions.forEach((s) => {
                        recordTraffic(
                            s.assigned_port,
                            s.bytes_in,
                            s.bytes_out,
                            s.interval_in,
                            s.interval_out,
                        );
                        seenPorts.add(String(s.assigned_port));

                        const existing = existingMap[String(s.assigned_port)];
                        if (existing) {
                            // Update text content only — preserve DOM nodes
                            const cells = existing.children;
                            // [0] client_id — static
                            // [1] port — static
                            // [2] player count
                            cells[2].textContent = s.player_count + "명";
                            cells[2].onclick = () =>
                                openPlayerModal(s.assigned_port, s.players);
                            // [3] unlimited toggle
                            updateUnlimitedCell(cells[3], s);
                            // [4] traffic
                            const trafficDivs =
                                cells[4].querySelectorAll("div");
                            trafficDivs[0].textContent =
                                "↓ " + formatBytesFixed(s.interval_in) + "/s";
                            trafficDivs[1].textContent =
                                "↑ " + formatBytesFixed(s.interval_out) + "/s";
                            cells[4].onclick = () =>
                                openTrafficModal(
                                    s.assigned_port,
                                    s.bytes_in,
                                    s.bytes_out,
                                    s.interval_in,
                                    s.interval_out,
                                );
                            // [5] created_at
                            cells[5].textContent = formatTime(s.created_at);
                            // [6] heartbeat
                            cells[6].textContent = formatHeartbeatCountdown(
                                s.last_heartbeat,
                            );
                            // [7] status — static unless changed
                            // [8] button — static
                        } else {
                            // Create new row
                            const tr = document.createElement("tr");
                            tr.dataset.port = s.assigned_port;
                            tr.innerHTML = `
              <td class="font-mono text-xs">${escapeHtml(s.client_id)}</td>
              <td><code class="bg-[hsl(220,15%,16%)] px-1.5 py-0.5 rounded text-xs">${s.assigned_port}</code></td>
              <td class="clickable">${s.player_count}명</td>
              <td class="unlimited-cell"></td>
              <td class="text-xs clickable">
                <div style="font-family:monospace;white-space:pre">↓ ${formatBytesFixed(s.interval_in)}/s</div>
                <div style="font-family:monospace;white-space:pre">↑ ${formatBytesFixed(s.interval_out)}/s</div>
              </td>
              <td class="text-sm text-[hsl(210,5%,55%)]">${formatTime(s.created_at)}</td>
              <td class="text-sm text-[hsl(210,5%,55%)]" style="font-family:monospace">${formatHeartbeatCountdown(s.last_heartbeat)}</td>

                            headers: { "Content-Type": "application/json" },

                        headers: { "Content-Type": "application/json" },

            function updateTrafficModalContent(port) {
                const ih = intervalHistory[port];
                const th = trafficHistory[port];
                if (!ih || ih.in.length === 0) return;

                const latestIntervalIn = ih.in[ih.in.length - 1].v;
                const latestIntervalOut = ih.out[ih.out.length - 1].v;
                const intTotal = latestIntervalIn + latestIntervalOut;
                const inPct =
                    intTotal > 0
                        ? Math.round((latestIntervalIn / intTotal) * 100)
                        : 50;
                const outPct = 100 - inPct;

                const elIn = document.getElementById("tm-in");
                const elOut = document.getElementById("tm-out");
                const elTotal = document.getElementById("tm-total");
                const elBarIn = document.getElementById("tm-bar-in");
                const elBarOut = document.getElementById("tm-bar-out");

                if (elIn)
                    elIn.textContent = formatBytes(latestIntervalIn) + "/s";
                if (elOut)
                    elOut.textContent = formatBytes(latestIntervalOut) + "/s";
                if (th && th.in.length > 0) {
                    const cumulative =
                        th.in[th.in.length - 1].v + th.out[th.out.length - 1].v;
                    if (elTotal) elTotal.textContent = formatBytes(cumulative);
                }
                if (elBarIn) elBarIn.style.width = inPct + "%";
                if (elBarOut) elBarOut.style.width = outPct + "%";
                if (elPctIn) elPctIn.textContent = "↓ " + inPct + "%";
                if (elPctOut) elPctOut.textContent = "↑ " + outPct + "%";

                // Rebuild graph
                const graphW = 560;
                const graphH = 160;
                const pad = { top: 20, right: 50, bottom: 24, left: 50 };
                const plotW = graphW - pad.left - pad.right;
                const plotH = graphH - pad.top - pad.bottom;

                // Use intervalHistory for the graph (real-time rate, not cumulative)
                const gih = intervalHistory[port];
                if (!gih || gih.in.length < 2) return;

                // Use separate scales for in/out so both are always visible
                const maxIn = Math.max(...gih.in.map((d) => d.v), 1);
                const maxOut = Math.max(...gih.out.map((d) => d.v), 1);
                const maxVal = Math.max(maxIn, maxOut);

                // Normalize each series to its own max, then scale to plotH
                function buildPathNorm(data, seriesMax) {
                    if (data.length < 2) return "";
                    const step = plotW / Math.max(data.length - 1, 1);
                    return data
                        .map((d, i) => {
                            const x = pad.left + i * step;
                            const y =
                                pad.top +
                                plotH -
                                (seriesMax > 0 ? (d.v / seriesMax) * plotH : 0);
                            return (
                                (i === 0 ? "M" : "L") +
                                x.toFixed(1) +
                                "," +
                                y.toFixed(1)
                            );
                        })
                        .join(" ");
                }

                function buildAreaNorm(data, seriesMax) {
                    if (data.length < 2) return "";
                    const step = plotW / Math.max(data.length - 1, 1);
                    const line = data
                        .map((d, i) => {
                            const x = pad.left + i * step;
                            const y =
                                pad.top +
                                plotH -
                                (seriesMax > 0 ? (d.v / seriesMax) * plotH : 0);

                                (i === 0 ? "M" : "L") +
                                x.toFixed(1) +
                                "," +
                                y.toFixed(1)

                    const lastX = pad.left + (data.length - 1) * step;
                    return (
                        line +
                        " L" +
                        lastX.toFixed(1) +
                        "," +
                        (pad.top + plotH) +
                        " L" +
                        pad.left +
                        "," +
                        (pad.top + plotH) +
                        " Z"
                    );
                }

                const inPath = buildPathNorm(gih.in, maxIn);
                const outPath = buildPathNorm(gih.out, maxOut);
                const inArea = buildAreaNorm(gih.in, maxIn);

                // Y-axis labels: show in scale on left, out scale on right

                              '<span class="flex items-center gap-1.5"><span class="w-3 h-0.5 rounded" style="background:hsl(210,80%,55%)"></span>수신 (↓) ' +

                        .map((d, i) => {

                            const y =

                            return (

                                "," +
                                y.toFixed(1)
                            );

                        line +
                        " L" +

                        "," +
                        (pad.top + plotH) +
                        " L" +
                        pad.left +
                        "," +
                        (pad.top + plotH) +
                        " Z"
                    );

                const inPath = buildPathNorm(inData, maxIn);
                const outPath = buildPathNorm(outData, maxOut);
                const inArea = buildAreaNorm(inData, maxIn);
                const outArea = buildAreaNorm(outData, maxOut);

                const yLabelsIn = [0, 0.5, 1]
                    .map((pct) => {

            function updateGlobalGraph() {
                // Merge all ports' intervalHistory into one combined series
                const allPorts = Object.keys(intervalHistory);
                if (allPorts.length === 0) return;

                // Find the max length across all ports
                let maxLen = 0;
                allPorts.forEach((port) => {
                    const ih = intervalHistory[port];
                    if (ih.in.length > maxLen) maxLen = ih.in.length;
                });
                if (maxLen < 2) return;

                // Sum interval values across all ports for each time index
                const mergedIn = [];
                const mergedOut = [];
                for (let i = 0; i < maxLen; i++) {
                    let sumIn = 0;
                    let sumOut = 0;
                    let t = 0;
                    allPorts.forEach((port) => {
                        const ih = intervalHistory[port];
                        if (i < ih.in.length) {
                            sumIn += ih.in[i].v;
                            sumOut += ih.out[i].v;
                            t = ih.in[i].t;
                        }
                    });
                    mergedIn.push({ t, v: sumIn });
                    mergedOut.push({ t, v: sumOut });
                }

                const container = document.getElementById(
                    "global-graph-container",
                );
                const label = document.getElementById("global-graph-label");
                if (container) {
                    container.innerHTML = buildGraphSVG(
                        mergedIn,
                        mergedOut,
                        800,
                        180,
                    );
                }
                if (label) {
                    const latest = mergedIn[mergedIn.length - 1];
                    const latestOut = mergedOut[mergedOut.length - 1];
                    label.textContent =
                        "↓ " +
                        formatBytes(latest.v) +
                        "/s  ↑ " +
                        formatBytes(latestOut.v) +
                        "/s";
                }
            }

            // ── 초기화 ──

            refreshAll();
            refreshInterval = setInterval(refreshAll, 1000); // 1초마다 갱신
        </script>
    </body>
</html>
